<!DOCTYPE html>
<html>
<head>
  <title>Homnix</title>

  <link rel="stylesheet" href="style.css">

  <script type="module" src="firebase.js"></script>
</head>

<body>

<div id="app">

  <div class="screen" id="splash">
    <h1>Homnix</h1>
    <p>Trusted Home Services</p>
    <button onclick="showLogin()">Get Started</button>
  </div>

  <div class="screen hidden" id="login">
    <h2>Login</h2>

    <input id="phone"
      placeholder="+91 9876543210">

    <div id="recaptcha-container"></div>

    <button onclick="sendOTP()">
      Send OTP
    </button>
  </div>

  <div class="screen hidden" id="otp">
    <h2>Enter OTP</h2>

    <input id="otpInput"
      placeholder="123456">

    <button onclick="verifyOTP()">
      Verify OTP
    </button>
  </div>

  <div class="screen hidden" id="home">

    <div class="topbar">
      <h2>Homnix</h2>

      <button onclick="toggleMenu()">☰</button>
    </div>

    <div id="menu" class="hidden menu">
      <p id="profileBtn">Profile</p>
      <p>Help</p>
    </div>

    <div class="offer">
      New Customer Offer 30% OFF
    </div>

    <h3>Services</h3>

    <div class="services">

      <div class="card">
        <h4>Painter</h4>
        <p>₹999</p>
        <button>Book</button>
      </div>

      <div class="card">
        <h4>House Cleaning</h4>
        <p>₹499</p>
        <button>Book</button>
      </div>

      <div class="card">
        <h4>House Help</h4>
        <p>₹799</p>
        <button>Book</button>
      </div>

      <div class="card">
        <h4>Plumbing</h4>
        <p>₹699</p>
        <button>Book</button>
      </div>

    </div>

    <div class="footer">
      help@homnix.com <br>
      +91 9999999999 <br><br>

      © 2026 Homnix
    </div>

  </div>

</div>

<script src="app.js"></script>

</body>
</html>
